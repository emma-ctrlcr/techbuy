<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TechBuy Admin - Productos</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="/admin/css/global.css">
    <link rel="stylesheet" href="/admin/css/productos-buscar.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css">
    <link rel="stylesheet" href="/admin/css/swal-custom.css">
</head>
<body>
    <nav class="sidebar" id="sidebar"></nav>
    <div class="main-content">
        <div class="top-bar">
            <h2><i class="fas fa-search"></i> Productos</h2>
            <div class="admin-info">
                <span class="admin-name"><strong id="adminName"></strong></span>
                <button class="logout-btn" id="logoutBtn">Salir</button>
            </div>
        </div>
        <div class="content">
            <div class="page-header">
                <h3 class="page-title">Buscar Productos</h3>
                <a href="/admin/productos-ingresar.html" class="btn btn-success"><i class="fas fa-plus"></i> Nuevo Producto</a>
            </div>
            <div class="card">
                <div class="search-bar">
                    <div class="search-wrap">
                        <input type="text" id="searchInput" placeholder="Buscar por nombre, ID o marca..." autocomplete="off">
                        <div class="search-suggestions" id="searchSuggestions"></div>
                    </div>
                    <select id="categoriaFilter">
                        <option value="todos">Todas las categorías</option>
                    </select>
                    <select id="descuentoFilter">
                        <option value="todos">Todos</option>
                        <option value="con">Con descuento</option>
                        <option value="sin">Sin descuento</option>
                    </select>
                    <button class="btn btn-primary" id="buscarBtn"><i class="fas fa-search"></i> Buscar</button>
                </div>
                <div class="alert-msg" id="alertMsg"></div>
                <div class="table-container">
                    <table class="table-productos">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Imagen</th>
                                <th>Nombre</th>
                                <th>Marca</th>
                                <th>Precio</th>
                                <th>Dto.</th>
                                <th>Stock</th>
                                <th>Categoría</th>
                                <th>Estado</th>
                                <th>Acciones</th>
                            </tr>
                        </thead>
                        <tbody id="productosTableBody"></tbody>
                    </table>
                </div>
                <div class="empty-state" id="emptyState" style="display:none;">
                    <div class="icon"><i class="fas fa-box-open fa-3x" style="opacity:0.4;"></i></div>
                    <p>No se encontraron productos</p>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script>window.showConfirm=window.showConfirm||async function(t,r){return confirm(r||'¿Estás seguro?')};window.showAlert=window.showAlert||function(m,t){m&&alert(m)};window.showLoading=window.showLoading||async function(){};window.closeLoading=window.closeLoading||function(){}</script>
    <script src="/admin/js/swal-init.js"></script>
    <script src="/admin/js/global.js"></script>
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <script src="/admin/js/admin-socket.js"></script>
    <script src="/admin/js/productos-buscar.js"></script>
</body>
</html>
