<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TechBuy Admin - Mensajes</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="/admin/css/global.css">
    <link rel="stylesheet" href="/admin/css/mensajes.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css">
    <link rel="stylesheet" href="/admin/css/swal-custom.css">
</head>
<body>
    <nav class="sidebar" id="sidebar"></nav>
    <div class="main-content">
        <div class="top-bar">
            <h2><i class="fas fa-envelope"></i> Mensajes de Usuarios</h2>
            <div class="admin-info">
                <span class="admin-name"><strong id="adminName"></strong></span>
                <button class="logout-btn" id="logoutBtn">Salir</button>
            </div>
        </div>
        <div class="content">
            <div class="alert-msg" id="alertMsg"></div>
            <div class="card">
                <div class="table-container">
                    <table class="mensajes-table">
                        <thead>
                            <tr>
                                <th class="col-id">ID</th>
                                <th class="col-nombre">Nombre</th>
                                <th class="col-email">Email</th>
                                <th class="col-telefono">Teléfono</th>
                                <th class="col-asunto">Asunto</th>
                                <th class="col-mensaje">Mensaje</th>
                                <th class="col-leido">Leído</th>
                                <th class="col-respondido">Respondido</th>
                                <th class="col-fecha">Fecha</th>
                                <th class="col-acciones">Acciones</th>
                            </tr>
                        </thead>
                        <tbody id="mensajesTableBody">
                            <tr><td colspan="10" style="text-align:center;padding:24px;">Cargando mensajes...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>

            <!-- MODAL DETALLE -->
            <div class="modal-overlay" id="detalleModal">
                <div class="modal" style="width:680px;max-width:95vw;">
                    <div class="modal-header">
                        <h3>Mensaje</h3>
                        <button class="modal-close" onclick="closeDetalleModal()">&times;</button>
                    </div>
                    <div id="detalleModalBody"></div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script>window.showConfirm=window.showConfirm||async function(t,r){return confirm(r||'¿Estás seguro?')};window.showAlert=window.showAlert||function(m){m&&alert(m)};window.showLoading=window.showLoading||async function(){};window.closeLoading=window.closeLoading||function(){}</script>
    <script src="/admin/js/swal-init.js"></script>
    <script src="/admin/js/global.js"></script>
    <script src="/admin/js/admin-socket.js"></script>
    <script src="/admin/js/mensajes.js"></script>
</body>
</html>
