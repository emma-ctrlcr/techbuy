<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TechBuy Admin - Ingresar Producto</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="/admin/css/global.css">
    <link rel="stylesheet" href="/admin/css/productos-ingresar.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css">
    <link rel="stylesheet" href="/admin/css/swal-custom.css">
</head>
<body>
    <nav class="sidebar" id="sidebar"></nav>
    <div class="main-content">
        <div class="top-bar">
            <h2><i class="fas fa-box"></i> Ingresar Producto</h2>
            <div class="admin-info">
                <span class="admin-name"><strong id="adminName"></strong></span>
                <button class="logout-btn" id="logoutBtn">Salir</button>
            </div>
        </div>
        <div class="content">
            <div class="card">
                <h3 class="card-title">Nuevo Producto</h3>
                <div class="alert-msg" id="alertMsg"></div>
                <form id="productoForm" enctype="multipart/form-data">
                    <div class="form-row">
                        <div class="form-group">
                            <label>Nombre del Producto *</label>
                            <input type="text" id="prodNombre" required>
                        </div>
                        <div class="form-group">
                            <label>Marca (Brand)</label>
                            <input type="text" id="prodBrand" placeholder="Ej: LG, Samsung, Apple">
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Descripción</label>
                            <textarea id="prodDescripcion" rows="3" required></textarea>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>Precio Original * (C$)</label>
                            <input type="number" id="prodPrecio" step="0.01" min="0.01" required oninput="calcularPrecioFinal('prodPrecio','prodDescuento','prodPrecioFinal')">
                        </div>
                        <div class="form-group">
                            <label>Precio Final (C$)</label>
                            <input type="number" id="prodPrecioFinal" step="0.01" min="0" readonly placeholder="Auto-calculado con descuento">
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>Descuento (%)</label>
                            <input type="number" id="prodDescuento" step="1" min="0" max="100" value="0" oninput="var v=parseInt(this.value)||0;if(v>100){this.value=100};calcularPrecioFinal('prodPrecio','prodDescuento','prodPrecioFinal')">
                        </div>
                        <div class="form-group">
                            <label>Stock (Cantidad) *</label>
                            <input type="number" id="prodStock" min="1" required value="1">
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>Categoría *</label>
                            <select id="prodCategoria" required>
                                <option value="">Seleccione...</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Badge (Etiqueta)</label>
                            <select id="prodBadge">
                                <option value="">Ninguna</option>
                                <option value="new">Nuevo</option>
                                <option value="sale">Oferta</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-group toggle-wrap">
                        <input type="checkbox" id="prodActivo" checked>
                        <label for="prodActivo" style="margin:0;font-weight:400;">Producto activo (visible en la tienda)</label>
                    </div>
                    <div class="form-group">
                        <label>Imágenes del Producto</label>
                        <div class="upload-zone" id="uploadZone">
                            <div class="upload-icon-wrap">
                                <i class="fas fa-cloud-upload-alt upload-icon"></i>
                            </div>
                            <div class="upload-title">Arrastra imágenes aquí</div>
                            <div class="upload-hint">o <strong>haz clic</strong> para seleccionar archivos<br>JPG, PNG &bull; Máx 5 imágenes &bull; Se convierten a WebP</div>
                            <input type="file" id="prodImagenes" class="upload-input" multiple accept=".jpg,.jpeg,.png,.webp">
                            <div class="upload-count" id="uploadCount"><i class="far fa-image"></i> <span>0 imágenes seleccionadas</span></div>
                        </div>
                        <div class="upload-preview" id="uploadPreview"></div>
                    </div>
                    <button type="submit" class="btn btn-success btn-lg"><i class="fas fa-save"></i> Guardar Producto</button>
                </form>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script>window.showConfirm=window.showConfirm||async function(t,r){return confirm(r||'¿Estás seguro?')};window.showAlert=window.showAlert||function(m,t){m&&alert(m)};window.showLoading=window.showLoading||async function(){};window.closeLoading=window.closeLoading||function(){}</script>
    <script src="/admin/js/swal-init.js"></script>
    <script src="/admin/js/global.js"></script>
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <script src="/admin/js/admin-socket.js"></script>
    <script src="/admin/js/productos-ingresar.js"></script>
</body>
</html>
