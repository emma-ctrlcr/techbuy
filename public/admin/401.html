<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TechBuy Admin - 401 No Autorizado</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #e8ecf1;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            -webkit-font-smoothing: antialiased;
        }
        .error-container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.08), 0 8px 32px rgba(0,0,0,0.04);
            overflow: hidden;
            width: 440px;
            max-width: 92%;
            animation: fadeInUp 0.5s ease;
            border: 1px solid #e2e8f0;
            text-align: center;
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(24px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .error-header {
            padding: 48px 32px 8px;
            border-bottom: 1px solid #e2e8f0;
        }
        .error-code {
            font-size: 96px;
            font-weight: 900;
            color: #1a2fcc;
            line-height: 1;
            letter-spacing: -4px;
        }
        .error-body {
            padding: 28px 32px 36px;
        }
        .error-body .accent {
            width: 48px;
            height: 4px;
            background: #1a2fcc;
            border-radius: 4px;
            margin: 0 auto 24px;
        }
        .error-title {
            font-size: 22px;
            font-weight: 700;
            color: #1e293b;
            margin-bottom: 10px;
        }
        .error-message {
            font-size: 14px;
            color: #64748b;
            line-height: 1.6;
            margin-bottom: 32px;
        }
        .error-actions {
            display: flex;
            gap: 12px;
            justify-content: center;
        }
        .btn {
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            font-family: inherit;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .btn-primary {
            background: #1a2fcc;
            color: white;
            border: none;
        }
        .btn-primary:hover {
            background: #0f1b7a;
            transform: translateY(-1px);
            box-shadow: 0 4px 16px rgba(26, 47, 204, 0.3);
        }
        .btn-secondary {
            background: transparent;
            color: #64748b;
            border: 1.5px solid #e2e8f0;
        }
        .btn-secondary:hover {
            border-color: #1a2fcc;
            color: #1a2fcc;
            transform: translateY(-1px);
        }
        @media (max-width: 768px) {
            .error-container { max-width: 96%; border-radius: 16px; }
            .error-header { padding: 36px 24px 8px; }
            .error-body { padding: 24px 24px 28px; }
            .error-code { font-size: 72px; }
        }
        @media (max-width: 480px) {
            .error-header { padding: 28px 16px 6px; }
            .error-body { padding: 18px 16px 22px; }
            .error-code { font-size: 56px; }
            .error-actions { flex-direction: column; }
            .btn { justify-content: center; }
        }
    </style>
</head>
<body>
    <div class="error-container">
        <div class="error-header">
            <img src="/admin/img/techbuy-logo.png" alt="TechBuy" class="logo" style="max-width:150px;margin-bottom:8px;">
            <div class="error-code">401</div>
        </div>
        <div class="error-body">
            <div class="accent"></div>
            <div class="error-title">Acceso no autorizado</div>
            <div class="error-message">
                Debes iniciar sesión para acceder a esta sección.<br>
                Si ya iniciaste sesión, es posible que tu sesión haya expirado.
            </div>
            <div class="error-actions">
                <a href="/admin/login.html" class="btn btn-primary"><i class="fas fa-sign-in-alt"></i> Ir al Login</a>
                <a href="/store/pages/1.html" class="btn btn-secondary"><i class="fas fa-store"></i> Volver al Inicio</a>
            </div>
        </div>
    </div>
</body>
</html>
